<!-- TopAppBar -->
<header class="bg-zinc-900 border-b border-white/10 flex justify-between items-center px-6 h-16 w-full fixed top-0 z-50 transition-all duration-200">
<div class="flex items-center gap-md">
<div class="h-8 w-8 rounded-full overflow-hidden bg-surface-container">
<img alt="User profile portrait" class="w-full h-full object-cover" data-alt="professional headshot of a person looking forward slightly smiling against a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwHgrv8-RgSdu6pbT520aNU73jBQs9LmK-kKFKwoisxYcDhRfxhrxm8MxF-gRZi4Luy9ZdWTuDBzXoUmxvG3ROGUYjF60uL4iLyQxvyouGdJ2-fEsU-mcUhAEweGKnSXMSKwAsw8Tl_J7tMsff3Rub7fJ6zuQCBJoMoepNwqALYp4Jck8pnxx4rA2x4LLmj4N4jWuQr0R4GcSM-UW857tEcxW8ALdQdIJ2734fRvSNAqFSIl-2ts-ZMueKgi9Jt2mwmGl5xwni9hw"/>
</div>
<span class="text-teal-400 font-black tracking-tighter text-2xl font-lexend">MedCore</span>
</div>
<div class="flex items-center gap-sm text-zinc-500 hover:bg-zinc-800/50 p-sm rounded-full cursor-pointer transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="max-w-3xl mx-auto mb-xl">
<!-- Header Image Section -->
<div class="relative w-full h-48 md:h-64 mb-gutter overflow-hidden shadow-lg border-b border-white/10 rounded-b-3xl">
<img alt="Calming professional medical background" class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAt1vT23OhUD6gPTBdofn7qQqhtyOu3GY0x0Gidr75DA0EEFIIUdKlGvGav4gk8MnPdGRCumN8xU4lHmAvgivwxntOMmG3SEhhATHVCO46-9XU0r3R1TETHlvGZFPYZxw_gR4VZ0lzUTpsRqsE_WHu_FQ__IZjGWhbHt2HWysStTY31I7fty8LfHZg6zVYWf6Lalv40PG1BjD3nRMUhlCwy0IXfIVKIgBduoOAQ2lmQmk4D9EROpi6BbOxEqdVPl3G9dj3LTVYKk0Q"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/40 to-transparent"></div>
<div class="absolute bottom-md left-0 px-6 w-full">
<h1 class="font-h1 text-h1 text-on-background mb-xs">Book Visit</h1>
<p class="font-body-lg text-on-surface-variant">Secure your appointment quickly.</p>
</div>
</div>
<div class="px-6 space-y-gutter">
<!-- Direct Action Banner -->
<div class="bg-surface-container-high rounded-xl p-md border border-white/10 flex items-center justify-between">
<div class="flex items-center gap-md">
<div class="bg-secondary/20 p-sm rounded-full text-secondary">
<span class="material-symbols-outlined" data-icon="call">call</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-on-background">Need help?</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Call us directly.</p>
</div>
</div>
<button class="bg-secondary text-on-secondary font-label-bold text-label-bold py-sm px-lg rounded-full hover:bg-secondary-fixed transition-colors active:scale-95 flex items-center gap-sm">
<span class="material-symbols-outlined text-[18px]" data-icon="phone_in_talk">phone_in_talk</span>
                Call Now
            </button>
</div>
<!-- Appointment Form Card -->
<div class="bg-surface-container rounded-xl p-lg border border-white/10 shadow-[0_4px_24px_rgba(0,0,0,0.2)]">
<form class="space-y-md">
<!-- Patient Info Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="name">Full Name</label>
<input class="bg-surface-dim border border-outline-variant rounded-lg px-md py-sm font-body-md text-on-background focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/50" id="name" placeholder="Jane Doe" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="phone">Phone Number</label>
<input class="bg-surface-dim border border-outline-variant rounded-lg px-md py-sm font-body-md text-on-background focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/50" id="phone" placeholder="(555) 123-4567" type="tel"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="email">Email Address</label>
<input class="bg-surface-dim border border-outline-variant rounded-lg px-md py-sm font-body-md text-on-background focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/50" id="email" placeholder="jane@example.com" type="email"/>
</div>
<!-- Scheduling Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md pt-sm border-t border-white/5">
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="date">Preferred Date</label>
<input class="bg-surface-dim border border-outline-variant rounded-lg px-md py-sm font-body-md text-on-background focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all [color-scheme:dark]" id="date" type="date"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="time">Preferred Time</label>
<select class="bg-surface-dim border border-outline-variant rounded-lg px-md py-sm font-body-md text-on-background focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all appearance-none" id="time">
<option value="">Select Time Slot</option>
<option value="morning">Morning (8AM - 12PM)</option>
<option value="afternoon">Afternoon (12PM - 4PM)</option>
<option value="evening">Evening (4PM - 7PM)</option>
</select>
</div>
</div>
<div class="flex flex-col gap-xs pt-sm">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="reason">Reason for Visit</label>
<textarea class="bg-surface-dim border border-outline-variant rounded-lg px-md py-sm font-body-md text-on-background focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/50 resize-none" id="reason" placeholder="Briefly describe your symptoms or reason for visit..." rows="3"></textarea>
</div>
<div class="pt-lg flex justify-end">
<button class="bg-primary text-on-primary font-label-bold text-label-bold py-md px-xl rounded-xl hover:bg-primary-fixed transition-colors active:scale-95 flex items-center gap-sm w-full md:w-auto justify-center shadow-[0_0_15px_rgba(87,241,219,0.3)]" type="button">
                        Book Now
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
</div>
</main>

<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 bg-zinc-900 px-4 pb-safe border-t border-white/10 rounded-t-lg shadow-[0_-4px_10px_rgba(0,0,0,0.3)]">

<span class="material-symbols-outlined mb-1" data-icon="home_health">home_health</span>
<span class="font-lexend text-[10px] font-semibold tracking-wide uppercase">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-500 opacity-70 hover:text-teal-300 active:scale-90 transition-transform duration-150 cursor-pointer w-1/4">
<span class="material-symbols-outlined mb-1" data-icon="medical_services">medical_services</span>
<span class="font-lexend text-[10px] font-semibold tracking-wide uppercase">Services</span>

<div class="flex flex-col items-center justify-center text-zinc-500 opacity-70 hover:text-teal-300 active:scale-90 transition-transform duration-150 cursor-pointer w-1/4">
<span class="material-symbols-outlined mb-1" data-icon="contact_support">contact_support</span>
<span class="font-lexend text-[10px] font-semibold tracking-wide uppercase">Contact</span>
</div>
</nav>
